name: Release

on:
  push:
    tags: ["v*"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Tag must match the version in pyproject.toml
        run: |
          PYVER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "pyproject version: $PYVER   pushed tag: $GITHUB_REF_NAME"
          test "v$PYVER" = "$GITHUB_REF_NAME"
      - name: Sanity checks
        run: |
          python -m py_compile aurora.py
          python -m unittest discover -s tests -t .

  github-release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Render fresh GIFs with the engine
        run: |
          python aurora.py --gif demo.gif --gif-size 320x200 --gif-frames 60 --gif-fps 20
          python aurora.py --dual --gif demo_dual.gif --gif-size 320x200 --gif-frames 60 --gif-fps 20
          python aurora.py --text "AURORA 3D" --gif aurora_text.gif --gif-size 360x150 --gif-frames 60 --gif-fps 20
      - name: Create the GitHub release with the GIFs attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Aurora3D $GITHUB_REF_NAME" \
            --generate-notes \
            demo.gif demo_dual.gif aurora_text.gif

  pypi-publish:
    needs: check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
